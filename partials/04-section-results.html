    <!-- Top Results Section -->
    <section id="results" class="results">
        <!-- Study-themed Background Animations (Same as About Us) -->
        <div class="study-animations">
            <div class="floating-book book-1"><i class="fas fa-book"></i></div>

            <div class="floating-chart chart-3"><i class="fas fa-chart-pie"></i></div>
            <div class="floating-graph graph-1">
                <svg viewBox="0 0 100 60" class="graph-svg">
                    <polyline points="10,50 25,40 40,30 55,20 70,15 85,10" fill="none" stroke="currentColor" stroke-width="2"/>

                    <circle cx="25" cy="40" r="2" fill="currentColor"/>

                    <circle cx="85" cy="10" r="2" fill="currentColor"/>
                </svg>
            </div>
            <div class="floating-graph graph-2">
                <svg viewBox="0 0 100 60" class="graph-svg">
                    <rect x="10" y="40" width="15" height="20" fill="currentColor" opacity="0.7"/>
                    <rect x="30" y="30" width="15" height="30" fill="currentColor" opacity="0.7"/>
                    <rect x="50" y="20" width="15" height="40" fill="currentColor" opacity="0.7"/>
                    <rect x="70" y="15" width="15" height="45" fill="currentColor" opacity="0.7"/>
                </svg>

            <div class="floating-icon-study icon-3"><i class="fas fa-pencil-alt"></i></div>
            <div class="floating-icon-study icon-4"><i class="fas fa-coins"></i></div>
            <div class="floating-icon-study icon-5"><i class="fas fa-globe"></i></div>
            <div class="floating-icon-study icon-6"><i class="fas fa-trending-up"></i></div>
            <div class="study-particle particle-1"></div>
            <div class="study-particle particle-2"></div>
            <div class="study-particle particle-3"></div>
            <div class="study-particle particle-4"></div>
            <div class="study-particle particle-5"></div>
            <div class="study-particle particle-6"></div>
            <div class="study-line line-1"></div>
            <div class="study-line line-2"></div>
            <div class="study-line line-3"></div>

        <div class="container">

            <p class="section-subtitle">Celebrating our students' outstanding achievements in Economics and BST</p>
            <div class="results-year-grid">
                <div class="year-card">
                    <div class="year-header">
                        <h3 class="year-title">2025</h3>
                        <div class="year-badge">
                            <i class="fas fa-trophy"></i>
                        </div>
                    </div>
                    <div class="year-image-container">

                            <i class="fas fa-image"></i>
                            <p>Add your image:<br>images/results/results-2025.jpg</p>
